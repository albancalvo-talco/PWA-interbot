<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0e">
<title>TALCO — Agent Vocal</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#E8A900;--gold-dim:#9e7200;
  --bg:#0e0e0e;--s1:#181818;--s2:#222;--s3:#2c2c2c;
  --b0:rgba(255,255,255,0.05);--b1:rgba(255,255,255,0.09);--b2:rgba(255,255,255,0.14);
  --text:#EEEAE4;--text2:#6a6860;
  --danger:#e05252;--success:#4ecb7a;--warn:#f5a623;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}

body{
  font-family:'Inter',sans-serif;
  background-color:var(--bg);
  color:var(--text);
  height:100dvh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* ══ PHOTO DE FOND FONDU ══ */
body::before {
  content: '';
  position: absolute;
  inset: 0;
  /* Utilisation de l'image de fond envoyée */
  background: url('./istockphoto-1328094196-612x612.jpg') center/cover no-repeat;
  opacity: 0.08; /* Ajuste l'opacité ici (0.08 = 8%) */
  filter: grayscale(100%) contrast(120%); /* Effet noir & blanc contrasté */
  z-index: 0;
  pointer-events: none;
}

.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden;position:relative;z-index:1;}
.screen.active{display:flex;}

/* ══ LOGIN ══ */
#screen-login{align-items:center;justify-content:center;padding:2rem 1.5rem;gap:0;}
.login-logo-wrap{background:#fff;border-radius:12px;padding:12px 18px;margin-bottom:2rem;display:inline-block;box-shadow:0 0 0 1px rgba(232,169,0,.2),0 8px 40px rgba(0,0,0,.6);}
.login-logo-wrap img{width:110px;display:block;pointer-events:none;}
.login-divider{width:36px;height:3px;background:var(--gold);border-radius:2px;margin:0 auto 1.8rem;}
.login-title{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,8vw,2.6rem);font-weight:800;text-align:center;line-height:1.1;margin-bottom:.4rem;letter-spacing:-.02em;}
.login-title span{color:var(--gold);}
.login-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:2.6rem;}
.btn-google{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--b2);color:var(--text);padding:15px 28px;border-radius:100px;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;width:100%;max-width:300px;justify-content:center;}
.btn-google:active{transform:scale(.97);border-color:var(--gold);}
.btn-google svg{width:20px;height:20px;flex-shrink:0;}
.login-note{margin-top:1.2rem;font-size:11px;color:var(--text2);text-align:center;}

/* ══ HEADER ══ */
.header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem;background:rgba(24,24,24,0.6);backdrop-filter:blur(10px);border-bottom:1px solid var(--b0);position:relative;flex-shrink:0;z-index:10;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.55;}
.header-logo-wrap{background:#fff;border-radius:6px;padding:4px 7px;}
.header-logo-wrap img{width:50px;display:block;pointer-events:none;}
.header-right{display:flex;align-items:center;gap:12px;}
.btn-history{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:6px 10px;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;color:var(--gold);cursor:pointer;transition:all .2s;}
.btn-history:active{background:var(--s3);transform:scale(0.95);}
.btn-history svg{width:16px;height:16px;}

/* ══ CENTER VIEW (ORB IMMERSIVE) ══ */
.chat-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding:2rem;}
.orb-container{display:flex;flex-direction:column;align-items:center;gap:30px;transform:translateY(-20px);}

/* Orbe */
.orb-wrap{position:relative;width:180px;height:180px;flex-shrink:0;}
.orb-layer{position:absolute;inset:0;border-radius:50%;pointer-events:none;}
.orb-bg{background:conic-gradient(from 0deg,rgba(232,169,0,.75),rgba(180,60,80,.55),rgba(90,60,180,.65),rgba(60,120,180,.5),rgba(232,169,0,.75));filter:blur(18px);animation:spin-slow 5s linear infinite;}
.orb-mid{inset:14px;background:radial-gradient(circle at 40% 35%,rgba(232,169,0,.92),rgba(160,50,80,.7) 45%,rgba(70,50,170,.55) 75%);filter:blur(8px);animation:pulse-mid 2.2s ease-in-out infinite alternate;}
.orb-core{inset:32px;background:radial-gradient(circle at 42% 38%,rgba(255,222,100,.98),rgba(232,169,0,.85) 45%,rgba(140,40,70,.6) 85%);filter:blur(4px);}
.orb-shine{inset:0;background:radial-gradient(circle at 28% 22%,rgba(255,255,255,.16),transparent 55%);}
@keyframes spin-slow{0%{transform:rotate(0);}100%{transform:rotate(360deg);}}
@keyframes pulse-mid{0%{transform:scale(.92);filter:blur(8px);}100%{transform:scale(1.08);filter:blur(12px);}}
.orb-bg.idle{animation-duration:7s;filter:blur(18px) saturate(.5);}
.orb-bg.listening{animation-duration:1.3s;}
.orb-bg.speaking{animation-duration:2.5s;}
.orb-bg.processing{animation-duration:4s;filter:blur(18px) hue-rotate(30deg);}

/* Bouton micro (Invisible par dessus l'orbe) */
.btn-mic-main{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;background:transparent;border:none;cursor:pointer;z-index:10;outline:none;box-shadow:none;-webkit-tap-highlight-color:transparent;}

/* Status label */
.orb-status{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);letter-spacing:.15em;text-transform:uppercase;text-align:center;height:20px;transition:color 0.3s;}
.orb-status.listening{color:var(--danger);font-weight:bold;}
.orb-status.speaking{color:var(--gold);font-weight:bold;}
.orb-status.processing{color:var(--warn);font-weight:bold;}

/* Sélecteur de Mode */
.mode-toggle{display:flex;background:rgba(24,24,24,0.8);backdrop-filter:blur(10px);border:1px solid var(--b2);border-radius:100px;padding:4px;margin-top:20px;position:relative;}
.mode-option{flex:1;padding:10px 16px;font-size:11px;font-weight:600;font-family:'Syne',sans-serif;color:var(--text2);text-align:center;cursor:pointer;border-radius:100px;transition:all 0.3s;position:relative;z-index:2;display:flex;align-items:center;gap:6px;}
.mode-option.active{color:#fff;}
.mode-slider{position:absolute;top:4px;bottom:4px;width:calc(50% - 4px);background:var(--s3);border-radius:100px;transition:transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);z-index:1;}
.mode-slider.right{transform:translateX(100%);}

/* ══ MODAL AVANCEMENT / HISTORIQUE ══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(3px);z-index:100;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.modal-overlay.active{opacity:1;pointer-events:auto;}
.modal-content{background:var(--bg);height:85dvh;border-radius:24px 24px 0 0;display:flex;flex-direction:column;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);border-top:1px solid var(--gold-dim);}
.modal-overlay.active .modal-content{transform:translateY(0);}

.modal-header{padding:16px 20px;border-bottom:1px solid var(--b1);display:flex;flex-direction:column;gap:12px;position:relative;}
.modal-handle{width:40px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto;}
.modal-title-row{display:flex;justify-content:space-between;align-items:center;}
.modal-title-row h2{font-family:'Syne',sans-serif;font-size:16px;color:var(--gold);}
.btn-close{background:transparent;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:4px;}

/* Barre de progression */
.progress-container{width:100%;}
.progress-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--text2);margin-bottom:6px;text-align:right;}
.progress-bar-bg{height:6px;background:var(--s2);border-radius:3px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--gold);width:0%;transition:width 0.5s ease;}

.modal-body{flex:1;overflow:hidden;display:flex;flex-direction:column;padding-bottom:20px;}

/* Récap champs */
.fields-recap-h{display:flex;gap:8px;padding:16px 20px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--b0);flex-shrink:0;}
.fields-recap-h::-webkit-scrollbar{display:none;}
.field-chip{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:8px 12px;font-family:'DM Mono',monospace;font-size:10px;white-space:nowrap;flex-shrink:0;}
.field-chip.done{border-color:rgba(78,203,122,.3);background:rgba(78,203,122,.06);}
.field-chip.done .fc-dot{background:var(--success);}
.field-chip .fc-dot{width:6px;height:6px;border-radius:50%;background:var(--b2);flex-shrink:0;}
.field-chip .fc-label{color:var(--text2);}
.field-chip.done .fc-label{color:var(--success);}

/* Historique Chat */
.conv-history{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;user-select:text;}
.bubble{max-width:85%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5;}
.bubble.agent{align-self:flex-start;background:var(--s2);border:1px solid var(--b1);border-bottom-left-radius:4px;color:var(--text);}
.bubble.agent .bubble-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);letter-spacing:.1em;margin-bottom:6px;text-transform:uppercase;}
.bubble.user{align-self:flex-end;background:rgba(232,169,0,.12);border:1px solid rgba(232,169,0,.2);border-bottom-right-radius:4px;color:var(--text);}
.bubble.user .bubble-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);letter-spacing:.1em;margin-bottom:6px;text-align:right;text-transform:uppercase;}

/* Loading overlay léger */
.sending-indicator{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border:3px solid var(--b2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;display:none;z-index:10;pointer-events:none;}
.sending-indicator.visible{display:block;}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--s3);border:1px solid var(--b2);border-radius:100px;padding:10px 20px;font-size:12px;color:var(--text);white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;}
.toast.visible{opacity:1;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-logo-wrap">
    <!-- Utilisation du logo fourni -->
    <img src="./logo-centre-talco-lr-seul.pdf.png" id="login-logo" alt="TALCO LR">
  </div>
  <div class="login-divider"></div>
  <h1 class="login-title">Agent<br><span>vocal</span></h1>
  <p class="login-sub">Rapport d'intervention par la voix</p>
  <div id="g_id_onload" data-client_id="303849110460-10rqg6oco2jseasj4ccsh1n0e4btulea.apps.googleusercontent.com" data-callback="handleGoogleCredential" data-auto_prompt="false"></div>
  <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_black" data-text="signin_with" data-size="large" data-locale="fr" data-width="280"></div>
  <button class="btn-google" id="btn-fallback" onclick="loginFallback()" style="display:none">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Se connecter
  </button>
  <p class="login-note">Réservé aux comptes @talco-lr.com</p>
  <div id="login-error" style="display:none;margin-top:1rem;padding:10px 16px;background:rgba(224,82,82,.1);border:1px solid var(--danger);border-radius:10px;font-size:12px;color:var(--danger);text-align:center;">⚠ Compte non autorisé</div>
</div>

<!-- CHAT VOCAL (IMMERSIF) -->
<div id="screen-chat" class="screen">
  <div class="header">
    <div class="header-logo-wrap">
      <!-- Utilisation du logo fourni -->
      <img src="./logo-centre-talco-lr-seul.pdf.png" id="header-logo" alt="TALCO LR">
    </div>
    <div class="header-right">
      <button class="btn-history" onclick="toggleModal(true)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
        Avancement
      </button>
    </div>
  </div>

  <div class="chat-body">
    <div class="orb-container">
      
      <div class="orb-wrap">
        <div class="orb-layer orb-bg idle" id="orb-bg"></div>
        <div class="orb-layer orb-mid"></div>
        <div class="orb-layer orb-core"></div>
        <div class="orb-layer orb-shine"></div>
        <div class="sending-indicator" id="sending-indicator"></div>
        <!-- Bouton invisible par dessus l'orbe -->
        <button class="btn-mic-main" id="btn-mic"></button>
      </div>

      <div class="orb-status" id="orb-status">Appuie pour parler</div>

      <div class="mode-toggle">
        <div class="mode-slider" id="mode-slider"></div>
        <div class="mode-option active" id="mode-ptt" onclick="setMode('ptt')">
          📻 Poussoir
        </div>
        <div class="mode-option" id="mode-cont" onclick="setMode('continuous')">
          🔄 Continu
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL AVANCEMENT ET HISTORIQUE -->
<div class="modal-overlay" id="history-modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-handle"></div>
      <div class="modal-title-row">
        <h2>Rapport d'intervention</h2>
        <button class="btn-close" onclick="toggleModal(false)">&times;</button>
      </div>
      <div class="progress-container">
        <div class="progress-text" id="progress-text">0 / 16 champs complétés</div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
      </div>
    </div>
    <div class="modal-body">
      <!-- Liste des champs récupérés -->
      <div class="fields-recap-h" id="fields-recap"></div>
      <!-- Historique bulles texte -->
      <div class="conv-history" id="conv-history"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
window.addEventListener('DOMContentLoaded',()=>{
  const saved=loadUserSession();
  if(saved){
    state.user=saved;
    startSession();
  }
  
  // Fermer modal au clic extérieur
  document.getElementById('history-modal').addEventListener('click', (e) => {
    if(e.target === document.getElementById('history-modal')) toggleModal(false);
  });
});

const CONFIG={
  GOOGLE_CLIENT_ID:'303849110460-10rqg6oco2jseasj4ccsh1n0e4btulea.apps.googleusercontent.com',
  N8N_VOICE_URL:'https://n8n.talco-lr.com/webhook/talco-voice-chat', /* <-- METS BIEN TON URL WEBHOOK ICI */
  ALLOWED_DOMAIN:'talco-lr.com'
};

const FIELD_LABELS={
  nom_client:'Client',numero_affaire:'Affaire',
  date_debut:'Début',date_fin:'Fin',
  heure_debut:'H.début',heure_fin:'H.fin',
  redacteur:'Rédacteur',techniciens_presents:'Techniciens',
  clients_presents:'Clients site',type_intervention:'Type',
  designation_precise:'Description',raison_intervention:'Raison',
  chantier_termine:'Terminé',si_non_details:'Reste à faire',
  difficultes:'Difficultés',points_attention:'Points attention'
};
const FIELD_ORDER=Object.keys(FIELD_LABELS);

let state={
  user:null, session_id:null, history:[], responses:{},
  is_complete:false, isListening:false, isProcessing:false,
  mediaRecorder:null, audioChunks:[], currentAudio:null,
  interactionMode: 'ptt' // 'ptt' (Push to Talk) ou 'continuous'
};

// ══ AUTH ══
const SESSION_KEY='talco_user_session', SESSION_TTL=7*24*60*60*1000;
function saveUserSession(user){ localStorage.setItem(SESSION_KEY, JSON.stringify({user, expires:Date.now()+SESSION_TTL})); }
function loadUserSession(){ try{ const raw=localStorage.getItem(SESSION_KEY); if(!raw)return null; const d=JSON.parse(raw); if(Date.now()>d.expires){localStorage.removeItem(SESSION_KEY);return null;} return d.user; }catch(e){return null;} }
function handleGoogleCredential(r){ try{ const p=JSON.parse(atob(r.credential.split('.'))); const email=p.email||'',name=p.name||email.split('@'); if(!email.endsWith('@'+CONFIG.ALLOWED_DOMAIN)){document.getElementById('login-error').style.display='block';return;} document.getElementById('login-error').style.display='none'; state.user={email,name,initials:name.split(' ').map(s=>s).join('').slice(0,2).toUpperCase()}; saveUserSession(state.user); startSession(); }catch(e){showToast('Erreur de connexion');} }
function loginFallback(){ const email=prompt('Email :','prenom.nom@talco-lr.com'); if(!email||!email.endsWith('@'+CONFIG.ALLOWED_DOMAIN)){document.getElementById('login-error').style.display='block';return;} document.getElementById('login-error').style.display='none'; const name=email.split('@').split('.').map(s=>s.charAt(0).toUpperCase()+s.slice(1)).join(' '); state.user={email,name,initials:name.split(' ').map(s=>s).join('').slice(0,2).toUpperCase()}; saveUserSession(state.user); startSession(); }
setTimeout(()=>{if(!window.google)document.getElementById('btn-fallback').style.display='flex';},4000);

function startSession(){
  state.session_id=`session_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
  state.history=[]; state.responses={}; state.is_complete=false;
  document.getElementById('conv-history').innerHTML='';
  updateProgressUI();
  showScreen('chat');
  sendToAgent(null,'__init__');
}

// ══ UI MODAL & MODE ══
function toggleModal(show){
  if(show) document.getElementById('history-modal').classList.add('active');
  else document.getElementById('history-modal').classList.remove('active');
}

function setMode(mode){
  state.interactionMode = mode;
  document.getElementById('mode-ptt').classList.toggle('active', mode==='ptt');
  document.getElementById('mode-cont').classList.toggle('active', mode==='continuous');
  document.getElementById('mode-slider').classList.toggle('right', mode==='continuous');
  
  if(!state.isProcessing && !state.isListening && !state.currentAudio){
    document.getElementById('orb-status').textContent = mode === 'ptt' ? 'Maintiens pour parler' : 'Tape pour parler';
  }
}

// ══ GESTION EVENEMENTS MICRO (ORBE) ══
const micBtn = document.getElementById('btn-mic');

micBtn.addEventListener('pointerdown', async (e) => {
  if(state.isProcessing || state.interactionMode !== 'ptt' || state.is_complete) return;
  e.preventDefault();
  await startRecording();
});

micBtn.addEventListener('pointerup', (e) => {
  if(state.interactionMode !== 'ptt' || !state.isListening) return;
  e.preventDefault();
  stopRecording();
});
micBtn.addEventListener('pointercancel', () => { if(state.isListening && state.interactionMode === 'ptt') stopRecording(); });
micBtn.addEventListener('pointerleave', () => { if(state.isListening && state.interactionMode === 'ptt') stopRecording(); });

micBtn.addEventListener('click', async (e) => {
  if(state.isProcessing || state.interactionMode !== 'continuous' || state.is_complete) return;
  e.preventDefault();
  
  if(state.isListening) {
    stopRecording();
  } else {
    if(state.currentAudio) {
      state.currentAudio.pause();
      state.currentAudio = null;
    }
    await startRecording();
  }
});

// ══ AUDIO ENREGISTREMENT ══
async function startRecording(){
  unlockAudio();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    state.audioChunks=[];
    state.mediaRecorder=new MediaRecorder(stream,{mimeType:'audio/webm'});
    state.mediaRecorder.ondataavailable=(e)=>{if(e.data.size>0)state.audioChunks.push(e.data);};
    state.mediaRecorder.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob=new Blob(state.audioChunks,{type:'audio/webm'});
      const b64=await blobToBase64(blob);
      sendToAgent(b64,null);
    };
    state.mediaRecorder.start();
    state.isListening=true;
    setOrbState('listening');
    document.getElementById('orb-status').textContent='Écoute...';
    document.getElementById('orb-status').className='orb-status listening';
  }catch(e){
    showToast('Micro non disponible');
  }
}

function stopRecording(){
  if(state.mediaRecorder&&state.isListening){
    state.mediaRecorder.stop();
    state.isListening=false;
    setOrbState('processing');
    document.getElementById('orb-status').textContent='Analyse...';
    document.getElementById('orb-status').className='orb-status processing';
  }
}

function blobToBase64(blob){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>{
      // NETTOYAGE FRONTEND : On coupe à la virgule
      const base64Data = r.result.split(',');
      res(base64Data);
    };
    r.onerror=rej;
    r.readAsDataURL(blob);
  });
}

// ══ API N8N ══
async function sendToAgent(audioBase64, textInput){
  if(state.isProcessing)return;
  state.isProcessing=true;
  document.getElementById('sending-indicator').classList.add('visible');
  if(audioBase64) addBubble('user','🎤 Message vocal');
  
  try{
    const payload={
      session_id: state.session_id, sender_email: state.user.email, sender_name: state.user.name,
      history: state.history, responses: state.responses
    };
    if(audioBase64) payload.audio_base64=audioBase64;
    if(textInput==='__init__') payload.text_input='__init__';

    const resp=await fetch(CONFIG.N8N_VOICE_URL, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)
    });

    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data=await resp.json();

    state.history=data.history||state.history;
    state.responses={...state.responses,...(data.responses||{})};
    state.is_complete=data.is_complete||false;
    
    if(data.speech) addBubble('agent',data.speech);
    updateProgressUI();

    if(data.audio_base64){
      await playAudio(data.audio_base64);
    }

    if(state.is_complete){
      setOrbState('idle');
      document.getElementById('orb-status').textContent='Rapport complet ✓';
      document.getElementById('orb-status').className='orb-status';
      document.getElementById('btn-mic').style.pointerEvents='none';
    }
  }catch(e){
    addBubble('agent','Erreur de communication avec le serveur.');
    showToast('Erreur : '+e.message);
  }finally{
    state.isProcessing=false;
    document.getElementById('sending-indicator').classList.remove('visible');
    if(!state.is_complete && !state.currentAudio){
      setOrbState('idle');
      document.getElementById('orb-status').textContent= state.interactionMode==='ptt' ? 'Maintiens pour parler' : 'Tape pour parler';
      document.getElementById('orb-status').className='orb-status';
    }
  }
}

// ══ LECTURE AUDIO (TTS) ══
let audioCtx = null;
function unlockAudio(){ if(!audioCtx){ audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } if(audioCtx.state === 'suspended') audioCtx.resume(); }

async function playAudio(base64){
  return new Promise(async (resolve)=>{
    if(!base64){resolve();return;}
    try{
      if(state.currentAudio){ state.currentAudio.pause(); state.currentAudio=null; }
      const raw = base64.replace(/^data:audio\/[^;]+;base64,/,'');
      const binary = atob(raw);
      const bytes = new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);

      unlockAudio();
      const buffer = await audioCtx.decodeAudioData(bytes.buffer);
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      source.connect(audioCtx.destination);

      setOrbState('speaking');
      document.getElementById('orb-status').textContent='TALCO-IA parle...';
      document.getElementById('orb-status').className='orb-status speaking';

      source.onended = ()=>{ 
        state.currentAudio = null;
        resolve(); 
        
        // AUTO-REPRISE SI MODE CONTINU
        if(!state.is_complete && state.interactionMode === 'continuous') {
            setTimeout(() => {
                if(!state.isListening && !state.isProcessing) startRecording();
            }, 600); // Petite pause naturelle de 0.6s
        } else if (!state.is_complete) {
            setOrbState('idle');
            document.getElementById('orb-status').textContent='Maintiens pour parler';
            document.getElementById('orb-status').className='orb-status';
        }
      };
      
      source.start(0);
      state.currentAudio = source;

    }catch(e){ resolve(); }
  });
}

// ══ MISE À JOUR INTERFACE MODAL ══
function addBubble(role,text){
  const hist=document.getElementById('conv-history');
  const div=document.createElement('div');
  div.className='bubble '+role;
  const label=role==='agent'?'TALCO-IA':'Vous';
  div.innerHTML=`<div class="bubble-label">${label}</div>${escHtml(text)}`;
  hist.appendChild(div);
  hist.scrollTop=hist.scrollHeight;
}

function updateProgressUI(){
  const recap=document.getElementById('fields-recap');
  recap.innerHTML='';
  
  let filledCount = 0;
  const totalFields = FIELD_ORDER.length;

  FIELD_ORDER.forEach(key=>{
    const val=state.responses[key];
    if(val) filledCount++;
    const chip=document.createElement('div');
    chip.className='field-chip'+(val?' done':'');
    chip.innerHTML=`<div class="fc-dot"></div><span class="fc-label">${FIELD_LABELS[key]} ${val ? ': '+escHtml(val) : ''}</span>`;
    recap.appendChild(chip);
  });

  const pct = Math.round((filledCount / totalFields) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${filledCount} / ${totalFields} champs complétés`;
}

function setOrbState(s){ document.getElementById('orb-bg').className='orb-layer orb-bg '+s; }
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showScreen(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+n).classList.add('active');}
function showToast(msg,d=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('visible');setTimeout(()=>t.classList.remove('visible'),d);}
</script>
