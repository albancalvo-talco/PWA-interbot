<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<meta name="description" content="TALCO Agent Vocal - Rapport d'intervention par la voix">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>TALCO — Agent Vocal</title>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<!-- VAD Library -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.14.0/dist/ort.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.7/dist/bundle.min.js"></script>

<style>
:root {
  /* Gold accent palette */
  --gold: #E8A900;
  --gold-bright: #FFD54F;
  --gold-dim: #9e7200;
  --gold-glow: rgba(232, 169, 0, 0.25);
  
  /* Dark backgrounds */
  --bg: #050505;
  --bg-elevated: #0c0c0c;
  --surface-1: #111111;
  --surface-2: #181818;
  --surface-3: #222222;
  
  /* Borders & overlays */
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-medium: rgba(255, 255, 255, 0.1);
  --border-gold: rgba(232, 169, 0, 0.3);
  
  /* Text */
  --text-primary: #F5F3EF;
  --text-secondary: #8A8780;
  --text-tertiary: #5A5850;
  
  /* States */
  --listening: #FF6B6B;
  --speaking: #E8A900;
  --processing: #7C6AFF;
  --success: #4ADE80;
  
  /* Sizing */
  --header-height: 56px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --radius-full: 100px;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Instrument Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Background texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: 
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(232, 169, 0, 0.08), transparent 50%),
    url('data:image/svg+xml,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.03"/></svg>');
  pointer-events: none;
  z-index: 0;
}

/* ══════════════════════════════════════════════════════════
   SCREENS
   ══════════════════════════════════════════════════════════ */
.screen {
  display: none;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

.screen.active {
  display: flex;
}

/* ══════════════════════════════════════════════════════════
   LOGIN SCREEN
   ══════════════════════════════════════════════════════════ */
#screen-login {
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  text-align: center;
}

.login-logo-wrap {
  background: #fff;
  border-radius: 16px;
  padding: 16px 24px;
  margin-bottom: 2.5rem;
  box-shadow: 
    0 0 0 1px var(--border-gold),
    0 20px 60px rgba(0, 0, 0, 0.6),
    0 0 80px var(--gold-glow);
}

.login-logo-wrap img {
  width: 120px;
  display: block;
  pointer-events: none;
}

.login-divider {
  width: 60px;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-dim));
  border-radius: 2px;
  margin: 0 auto 2rem;
}

.login-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(2rem, 10vw, 3rem);
  font-weight: 700;
  line-height: 1.1;
  margin-bottom: 0.5rem;
  letter-spacing: -0.03em;
}

.login-title span {
  color: var(--gold);
}

.login-sub {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 3rem;
  font-weight: 400;
}

.btn-google {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--surface-2);
  border: 1px solid var(--border-medium);
  color: var(--text-primary);
  padding: 16px 32px;
  border-radius: var(--radius-full);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  width: 100%;
  max-width: 320px;
  justify-content: center;
}

.btn-google:hover {
  background: var(--surface-3);
  border-color: var(--gold-dim);
}

.btn-google:active {
  transform: scale(0.97);
}

.btn-google svg {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

.login-note {
  margin-top: 1.5rem;
  font-size: 12px;
  color: var(--text-tertiary);
}

.login-spinner {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  margin-top: 2rem;
}

.login-spinner.visible {
  display: flex;
}

.spinner-ring {
  width: 36px;
  height: 36px;
  border: 3px solid var(--surface-3);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.login-spinner-text {
  font-size: 13px;
  color: var(--text-secondary);
}

#login-error {
  display: none;
  margin-top: 1.5rem;
  padding: 12px 20px;
  background: rgba(255, 107, 107, 0.08);
  border: 1px solid rgba(255, 107, 107, 0.25);
  border-radius: var(--radius-md);
  font-size: 13px;
  color: var(--listening);
}

/* ══════════════════════════════════════════════════════════
   MAIN CHAT SCREEN
   ══════════════════════════════════════════════════════════ */
#screen-chat {
  display: none;
}

#screen-chat.active {
  display: flex;
}

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: var(--header-height);
  background: rgba(10, 10, 10, 0.8);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
  z-index: 10;
}

.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
}

.header-logo {
  background: #fff;
  border-radius: 8px;
  padding: 4px 8px;
  display: flex;
  align-items: center;
}

.header-logo img {
  height: 28px;
  display: block;
}

.header-user {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--gold);
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
}

.btn-logout {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  color: var(--text-secondary);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-logout:hover {
  border-color: var(--border-medium);
  color: var(--text-primary);
}

.btn-logout svg {
  width: 16px;
  height: 16px;
}

/* ── MAIN CONTENT ── */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 20px;
  gap: 20px;
}

/* ── PROGRESS SECTION ── */
.progress-section {
  text-align: center;
  flex-shrink: 0;
}

.progress-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--text-tertiary);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.progress-bar-container {
  max-width: 300px;
  margin: 0 auto;
}

.progress-bar-bg {
  height: 6px;
  background: var(--surface-2);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dim), var(--gold));
  border-radius: 3px;
  width: 0%;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.progress-bar-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 20px;
  background: linear-gradient(90deg, transparent, var(--gold-bright));
  filter: blur(4px);
}

.progress-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 8px;
}

.progress-count b {
  color: var(--gold);
  font-weight: 500;
}

/* ── ORB SECTION ── */
.orb-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding: 10px 0;
}

.orb-container {
  position: relative;
  width: 140px;
  height: 140px;
}

.orb-layer {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
}

.orb-glow {
  inset: -30px;
  background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
  opacity: 0.6;
  animation: orb-glow-pulse 3s ease-in-out infinite;
}

@keyframes orb-glow-pulse {
  0%, 100% { transform: scale(0.9); opacity: 0.4; }
  50% { transform: scale(1.1); opacity: 0.7; }
}

.orb-outer {
  background: conic-gradient(
    from 0deg,
    rgba(232, 169, 0, 0.8),
    rgba(180, 60, 80, 0.6),
    rgba(100, 60, 180, 0.5),
    rgba(60, 140, 200, 0.4),
    rgba(232, 169, 0, 0.8)
  );
  filter: blur(12px);
  animation: orb-spin 6s linear infinite;
}

.orb-outer.idle { animation-duration: 8s; filter: blur(12px) saturate(0.5); }
.orb-outer.listening { animation-duration: 1s; filter: blur(12px) saturate(1.3); }
.orb-outer.speaking { animation-duration: 3s; filter: blur(12px) saturate(1.1); }
.orb-outer.processing { animation-duration: 4s; filter: blur(12px) hue-rotate(30deg); }

@keyframes orb-spin {
  to { transform: rotate(360deg); }
}

.orb-middle {
  inset: 15px;
  background: radial-gradient(
    circle at 40% 35%,
    rgba(232, 169, 0, 0.95),
    rgba(180, 60, 80, 0.7) 50%,
    rgba(80, 50, 160, 0.5) 80%
  );
  filter: blur(6px);
  animation: orb-pulse 2.5s ease-in-out infinite alternate;
}

@keyframes orb-pulse {
  0% { transform: scale(0.92); filter: blur(6px); }
  100% { transform: scale(1.06); filter: blur(8px); }
}

.orb-core {
  inset: 30px;
  background: radial-gradient(
    circle at 42% 38%,
    rgba(255, 230, 120, 1),
    rgba(232, 169, 0, 0.9) 50%,
    rgba(160, 50, 70, 0.6) 90%
  );
  filter: blur(2px);
}

.orb-shine {
  inset: 0;
  background: radial-gradient(
    circle at 30% 25%,
    rgba(255, 255, 255, 0.2),
    transparent 50%
  );
}

.orb-status {
  margin-top: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-secondary);
  transition: color 0.3s;
}

.orb-status.listening { color: var(--listening); }
.orb-status.speaking { color: var(--speaking); }
.orb-status.processing { color: var(--processing); }

/* ── ACTION SECTION (Commencer button / Questions) ── */
.action-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

.btn-start {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--gold);
  color: var(--bg);
  padding: 18px 48px;
  border-radius: var(--radius-full);
  border: none;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 
    0 4px 20px rgba(232, 169, 0, 0.3),
    0 0 60px rgba(232, 169, 0, 0.15);
}

.btn-start:hover {
  transform: translateY(-2px);
  box-shadow: 
    0 8px 30px rgba(232, 169, 0, 0.4),
    0 0 80px rgba(232, 169, 0, 0.2);
}

.btn-start:active {
  transform: scale(0.96);
}

.btn-start svg {
  width: 22px;
  height: 22px;
}

.btn-start.hidden {
  display: none;
}

/* ── QUESTIONS DISPLAY ── */
.questions-display {
  display: none;
  width: 100%;
  max-width: 600px;
  gap: 12px;
  align-items: stretch;
}

.questions-display.active {
  display: flex;
}

.question-card {
  background: var(--surface-1);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  transition: all 0.3s ease;
}

.question-current {
  flex: 2;
  border-color: var(--gold-dim);
  background: linear-gradient(145deg, var(--surface-2), var(--surface-1));
  box-shadow: 
    0 0 0 1px var(--border-gold),
    0 8px 32px rgba(0, 0, 0, 0.3),
    0 0 40px var(--gold-glow);
}

.question-future {
  flex: 1;
  opacity: 0.4;
  filter: blur(1px);
  border-color: var(--border-subtle);
}

.question-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  margin-bottom: 8px;
}

.question-current .question-label {
  color: var(--gold);
}

.question-text {
  font-size: 15px;
  line-height: 1.5;
  color: var(--text-primary);
}

.question-future .question-text {
  font-size: 13px;
  color: var(--text-secondary);
}

/* ── HISTORY SECTION ── */
.history-section {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.history-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  padding-left: 4px;
  flex-shrink: 0;
}

.history-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  overflow-y: auto;
  padding: 4px;
}

.history-chips::-webkit-scrollbar {
  width: 3px;
}

.history-chips::-webkit-scrollbar-thumb {
  background: var(--surface-3);
  border-radius: 3px;
}

.history-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-1);
  border: 1px solid rgba(74, 222, 128, 0.2);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-size: 12px;
  animation: chip-in 0.3s ease-out;
}

@keyframes chip-in {
  from { opacity: 0; transform: translateY(10px) scale(0.9); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.history-chip-icon {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--success);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.history-chip-icon svg {
  width: 8px;
  height: 8px;
  color: var(--bg);
}

.history-chip-label {
  color: var(--text-secondary);
  font-weight: 500;
}

.history-chip-value {
  color: var(--text-primary);
  max-width: 150px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── VAD SETTINGS ── */
.vad-settings {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 12px;
  background: var(--surface-1);
  border-radius: var(--radius-md);
  margin-top: auto;
  flex-shrink: 0;
}

.vad-settings.visible {
  display: flex;
}

.vad-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 0.05em;
}

.vad-slider {
  width: 100px;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--surface-3);
  border-radius: 2px;
  cursor: pointer;
}

.vad-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  background: var(--gold);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(232, 169, 0, 0.4);
}

.vad-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--gold);
  min-width: 35px;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface-3);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-full);
  padding: 12px 24px;
  font-size: 13px;
  color: var(--text-primary);
  white-space: nowrap;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
  z-index: 300;
}

.toast.visible {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ══════════════════════════════════════════════════════════
   RESPONSIVE
   ══════════════════════════════════════════════════════════ */
@media (min-width: 768px) {
  .main-content {
    padding: 30px 40px;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
  }
  
  .orb-container {
    width: 180px;
    height: 180px;
  }
  
  .questions-display {
    max-width: 700px;
  }
}

@media (max-height: 700px) {
  .orb-container {
    width: 100px;
    height: 100px;
  }
  
  .main-content {
    gap: 12px;
    padding: 12px;
  }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     LOGIN SCREEN
     ══════════════════════════════════════════════════════════ -->
<div id="screen-login" class="screen active">
  <div class="login-logo-wrap">
    <img src="./logo-centre-talco-lr-seul.pdf.png" alt="TALCO LR">
  </div>
  <div class="login-divider"></div>
  <h1 class="login-title">Agent<br><span>Vocal</span></h1>
  <p class="login-sub">Rapport d'intervention par la voix</p>
  
  <button class="btn-google" id="btn-google-login" onclick="loginWithGoogleRedirect()">
    <svg viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Se connecter avec Google
  </button>
  
  <div class="login-spinner" id="login-spinner">
    <div class="spinner-ring"></div>
    <div class="login-spinner-text">Connexion en cours...</div>
  </div>
  
  <p class="login-note">Réservé aux comptes @talco-lr.com</p>
  <div id="login-error">⚠ Compte non autorisé</div>
</div>

<!-- ══════════════════════════════════════════════════════════
     MAIN CHAT SCREEN
     ══════════════════════════════════════════════════════════ -->
<div id="screen-chat" class="screen">
  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <img src="./logo-centre-talco-lr-seul.pdf.png" alt="TALCO">

};

  history: [],
  responses: {},
  is_complete: false,
  currentFieldIndex: 0,
  vadInstance: null,

// ══════════════════════════════════════════════════════════
// SESSION MANAGEMENT
// ══════════════════════════════════════════════════════════
const SESSION_KEY = 'talco_user_session';
const SESSION_TTL = 7 * 24 * 60 * 60 * 1000; // 7 jours

function saveUserSession(user) {
  localStorage.setItem(SESSION_KEY, JSON.stringify({
    user: user,
    expires: Date.now() + SESSION_TTL
  }));
}

function loadUserSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    if (Date.now() > data.expires) {
      localStorage.removeItem(SESSION_KEY);
      return null;
    }
    return data.user;
  } catch (e) {
    return null;
  }
}

function logout() {
  localStorage.removeItem(SESSION_KEY);
  state.user = null;
  state.session_id = null;
  if (state.vadInstance) {
    state.vadInstance.destroy();
    state.vadInstance = null;
  }
  showScreen('login');
  document.getElementById('btn-google-login').style.display = 'flex';
  document.getElementById('login-spinner').classList.remove('visible');
  document.getElementById('login-error').style.display = 'none';
}

// ══════════════════════════════════════════════════════════
// GOOGLE OAUTH
// ══════════════════════════════════════════════════════════
function loginWithGoogleRedirect() {
  const stateToken = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);
  sessionStorage.setItem('oauth_state', stateToken);
  
  const params = new URLSearchParams({
    client_id: CONFIG.GOOGLE_CLIENT_ID,
    redirect_uri: CONFIG.REDIRECT_URI,
    response_type: 'token',
    scope: 'openid email profile',
    state: stateToken,
    prompt: 'select_account',
    hd: CONFIG.ALLOWED_DOMAIN
  });
  
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

function handleOAuthRedirect() {
  const hash = window.location.hash.substring(1);
  if (!hash || !hash.includes('access_token')) return false;
  
  const params = new URLSearchParams(hash);
  const token = params.get('access_token');
  const returnedState = params.get('state');
  const savedState = sessionStorage.getItem('oauth_state');
  
  history.replaceState(null, '', window.location.pathname);
  sessionStorage.removeItem('oauth_state');
  
  if (!returnedState || returnedState !== savedState) {
    showLoginError('Erreur de sécurité. Réessayez.');
    return true;
  }
  
  if (!token) {
    showLoginError('Token manquant.');
    return true;
  }
  
  document.getElementById('btn-google-login').style.display = 'none';
  document.getElementById('login-spinner').classList.add('visible');
  
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(profile => {
    const email = profile.email || '';
    const name = profile.name || email.split('@')[0];
    
    if (!email.endsWith('@' + CONFIG.ALLOWED_DOMAIN)) {
      showLoginError('Compte non autorisé.');
      document.getElementById('btn-google-login').style.display = 'flex';
      document.getElementById('login-spinner').classList.remove('visible');
      return;
    }
    
    state.user = {
      email: email,
      name: name,
      initials: name.split(' ').map(s => (s[0] || '')).join('').slice(0, 2).toUpperCase()
    };
    
    saveUserSession(state.user);
    goToChat();
  })
  .catch(e => {
    showLoginError('Erreur. Réessayez.');
    document.getElementById('btn-google-login').style.display = 'flex';
    document.getElementById('login-spinner').classList.remove('visible');
  });
  
  return true;
}

function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

// ══════════════════════════════════════════════════════════
// SCREEN NAVIGATION
// ══════════════════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function goToChat() {
  // Update header with user info
  document.getElementById('user-avatar').textContent = state.user.initials;
  document.getElementById('user-fullname').textContent = state.user.name;
  
  // Reset state
  state.session_id = `session_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
  state.history = [];
  state.responses = {};
  state.is_complete = false;
  state.currentFieldIndex = 0;
  
  // Reset UI
  document.getElementById('btn-start').classList.remove('hidden');
  document.getElementById('questions-display').classList.remove('active');
  document.getElementById('history-section').style.display = 'none';
  document.getElementById('history-chips').innerHTML = '';
  document.getElementById('vad-settings').classList.remove('visible');
  
  updateProgressUI();
  showScreen('chat');
}

// ══════════════════════════════════════════════════════════
// CONVERSATION FLOW
// ══════════════════════════════════════════════════════════
async function startConversation() {
  // Hide start button, show questions
  document.getElementById('btn-start').classList.add('hidden');
  document.getElementById('questions-display').classList.add('active');
  document.getElementById('vad-settings').classList.add('visible');
  document.getElementById('history-section').style.display = 'flex';
  
  // Initialize VAD
  await initVAD();
  
  // Send init to backend
  await sendToAgent(null, '__init__');
}

// ══════════════════════════════════════════════════════════
// VAD (Voice Activity Detection)
// ══════════════════════════════════════════════════════════
async function initVAD() {
  if (state.vadInstance) return;
  
  try {
    setOrbState('processing');
    setStatus('Initialisation micro...', 'processing');
    
    // Calculate redemption frames based on silence duration
    // Each frame is ~96ms, so 2000ms / 96 ≈ 21 frames
    const redemptionFrames = Math.round(state.vadSilenceMs / 96);
    
    // Vérifier que la librairie est chargée
    if (typeof vad === 'undefined' || !vad.MicVAD) {
      throw new Error('Librairie VAD non chargée');
    }
    
    state.vadInstance = await vad.MicVAD.new({
      positiveSpeechThreshold: 0.8,
      negativeSpeechThreshold: 0.4,
      redemptionFrames: redemptionFrames,
      minSpeechFrames: 5,
      preSpeechPadFrames: 10,
      
      onSpeechStart: () => {
        if (state.isSpeaking || state.isProcessing) return;
        console.log('🎤 Parole détectée');
        state.isListening = true;
        setOrbState('listening');
        setStatus('Écoute...', 'listening');
      },
      
      onSpeechEnd: async (audio) => {
        if (state.isSpeaking || state.isProcessing) return;
        console.log('🔇 Fin de parole détectée');
        state.isListening = false;
        
        // Convert Float32Array to WAV then to base64
        const wavBlob = float32ToWav(audio, 16000);
        const base64 = await blobToBase64(wavBlob);
        
        await sendToAgent(base64, null);
      },
      
      onVADMisfire: () => {
        console.log('⚠️ VAD misfire (bruit court)');
      }
    });
    
    // Démarrer le VAD
    state.vadInstance.start();
    
    setOrbState('idle');
    setStatus('Prêt', '');
    showToast('Micro activé - Parlez !');
    
  } catch (e) {
    console.error('Erreur VAD:', e);
    showToast('Erreur micro: ' + e.message);
    setOrbState('idle');
    setStatus('Erreur micro', '');
    
    // Fallback : proposer le mode manuel
    offerManualMode();
  }
}

function offerManualMode() {
  // Si VAD échoue, on peut basculer en mode push-to-talk
  console.log('Basculement en mode manuel (push-to-talk)');
}

function pauseVAD() {
  if (state.vadInstance) {
    state.vadInstance.pause();
  }
}

function resumeVAD() {
  if (state.vadInstance && !state.isSpeaking && !state.isProcessing) {
    state.vadInstance.start();
  }
}

// Update VAD settings when slider changes
document.getElementById('vad-slider').addEventListener('input', (e) => {
  const value = parseFloat(e.target.value);
  state.vadSilenceMs = value * 1000;
  document.getElementById('vad-value').textContent = value.toFixed(1) + 's';
  
  // Reinitialize VAD with new settings if active
  if (state.vadInstance) {
    state.vadInstance.destroy();
    state.vadInstance = null;
    initVAD();
  }
});

// ══════════════════════════════════════════════════════════
// AUDIO UTILITIES
// ══════════════════════════════════════════════════════════
function float32ToWav(float32Array, sampleRate) {
  const buffer = new ArrayBuffer(44 + float32Array.length * 2);
  const view = new DataView(buffer);
  
  // WAV header
  const writeString = (offset, string) => {
    for (let i = 0; i < string.length; i++) {
      view.setUint8(offset + i, string.charCodeAt(i));
    }
  };
  
  writeString(0, 'RIFF');
  view.setUint32(4, 36 + float32Array.length * 2, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(36, 'data');
  view.setUint32(40, float32Array.length * 2, true);
  
  // Convert float32 to int16
  let offset = 44;
  for (let i = 0; i < float32Array.length; i++) {
    const s = Math.max(-1, Math.min(1, float32Array[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    offset += 2;
  }
  
  return new Blob([buffer], { type: 'audio/wav' });
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function ensureAudioContext() {
  if (!state.audioContext) {
    state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (state.audioContext.state === 'suspended') {
    state.audioContext.resume();
  }
}

function stopCurrentAudio() {
  if (state.currentAudioSource) {
    try {
      state.currentAudioSource.stop();
    } catch (e) {}
    state.currentAudioSource = null;
  }
}

async function playAudio(base64) {
  return new Promise(async (resolve) => {
    if (!base64 || base64.length < 100) {
      resolve();
      return;
    }
    
    try {
      stopCurrentAudio();
      ensureAudioContext();
      pauseVAD();
      
      state.isSpeaking = true;
      setOrbState('speaking');
      setStatus('TALCO-IA parle...', 'speaking');
      
      const raw = base64.includes(',') ? base64.split(',')[1] : base64;
      const binary = atob(raw);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }
      
      const audioBuffer = await state.audioContext.decodeAudioData(bytes.buffer.slice(0));
      const source = state.audioContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(state.audioContext.destination);
      
      source.onended = () => {
        state.currentAudioSource = null;
        state.isSpeaking = false;
        setOrbState('idle');
        setStatus('À vous...', '');
        
        // Resume VAD after speaking
        setTimeout(() => {
          resumeVAD();
        }, 300);
        
        resolve();
      };
      
      state.currentAudioSource = source;
      source.start(0);
      
    } catch (e) {
      console.error('Erreur playAudio:', e);
      state.currentAudioSource = null;
      state.isSpeaking = false;
      resumeVAD();
      resolve();
    }
  });
}

// ══════════════════════════════════════════════════════════
// BACKEND COMMUNICATION (avec timeout 30s)
// ══════════════════════════════════════════════════════════
async function sendToAgent(audioBase64, textInput) {
  if (state.isProcessing) return;
  
  state.isProcessing = true;
  pauseVAD();
  setOrbState('processing');
  setStatus('Analyse...', 'processing');
  
  // Préparer le timeout (30 secondes max)
  const controller = new AbortController();
  const timeoutId = setTimeout(() => {
    controller.abort();
  }, 30000);
  
  try {
    const payload = {
      session_id: state.session_id,
      sender_email: state.user.email,
      sender_name: state.user.name,
      history: state.history,
      responses: state.responses
    };
    
    if (audioBase64) payload.audio_base64 = audioBase64;
    if (textInput === '__init__') payload.text_input = '__init__';
    
    // DEBUG: Afficher ce qu'on envoie
    console.log('📤 Envoi au backend:', {
      session_id: payload.session_id,
      responses: payload.responses,
      history_length: payload.history.length
    });
    
    const resp = await fetch(CONFIG.N8N_VOICE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller.signal
    });
    
    // Annuler le timeout si la requête a réussi
    clearTimeout(timeoutId);
    
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    
    const data = await resp.json();
    
    // DEBUG: Afficher ce qu'on reçoit
    console.log('📥 Réponse du backend:', {
      responses: data.responses,
      history_length: data.history?.length,
      is_complete: data.is_complete,
      speech: data.speech?.substring(0, 50) + '...'
    });
    
    // Update state - IMPORTANT: fusionner correctement les responses
    state.history = data.history || state.history;
    
    // Fusionner les nouvelles responses avec les anciennes (ne pas écraser)
    if (data.responses) {
      Object.keys(data.responses).forEach(key => {
        if (data.responses[key]) {
          state.responses[key] = data.responses[key];
        }
      });
    }
    
    state.is_complete = data.is_complete || false;
    
    // DEBUG: Afficher l'état après mise à jour
    console.log('💾 État après mise à jour:', {
      responses: state.responses,
      is_complete: state.is_complete
    });
    
    // Update UI
    updateProgressUI();
    updateQuestionsUI(data);
    
    // Play audio response
    if (data.audio_base64) {
      await playAudio(data.audio_base64);
    }
    
    // Check if complete
    if (state.is_complete) {
      setOrbState('idle');
      setStatus('Rapport complet ✓', 'speaking');
      showToast('Rapport terminé !', 5000);
      if (state.vadInstance) {
        state.vadInstance.destroy();
        state.vadInstance = null;
      }
    }
    
  } catch (e) {
    // Annuler le timeout en cas d'erreur aussi
    clearTimeout(timeoutId);
    
    console.error('Erreur sendToAgent:', e);
    
    // Message d'erreur adapté
    if (e.name === 'AbortError') {
      showToast('Timeout - Le serveur met trop de temps. Réessaie.', 4000);
      setStatus('Timeout', '');
    } else {
      showToast('Erreur: ' + e.message);
      setStatus('Erreur', '');
    }
    
    setOrbState('idle');
  } finally {
    state.isProcessing = false;
    if (!state.is_complete && !state.isSpeaking) {
      resumeVAD();
    }
  }
}

// ══════════════════════════════════════════════════════════
// UI UPDATES
// ══════════════════════════════════════════════════════════
function updateProgressUI() {
  let filled = 0;
  FIELD_ORDER.forEach(k => {
    if (state.responses[k]) filled++;
  });
  
  const total = FIELD_ORDER.length;
  const pct = Math.round((filled / total) * 100);
  
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-current').textContent = filled;
  document.getElementById('progress-total').textContent = total;
}

function updateQuestionsUI(data) {
  // Update current question
  if (data.speech) {
    document.getElementById('current-question').textContent = data.speech;
  }
  
  // Find next unanswered field for future question
  let nextFieldIndex = -1;
  for (let i = 0; i < FIELD_ORDER.length; i++) {
    if (!state.responses[FIELD_ORDER[i]]) {
      nextFieldIndex = i;
      break;
    }
  }
  
  // Show future question (next unanswered after current)
  if (nextFieldIndex >= 0 && nextFieldIndex < FIELD_ORDER.length - 1) {
    let futureIndex = nextFieldIndex + 1;
    while (futureIndex < FIELD_ORDER.length && state.responses[FIELD_ORDER[futureIndex]]) {
      futureIndex++;
    }
    if (futureIndex < FIELD_ORDER.length) {
      document.getElementById('future-question').textContent = FIELD_LABELS[FIELD_ORDER[futureIndex]] + ' ?';
    } else {
      document.getElementById('future-question').textContent = '—';
    }
  } else {
    document.getElementById('future-question').textContent = '—';
  }
  
  // Update history chips
  const chipsContainer = document.getElementById('history-chips');
  chipsContainer.innerHTML = '';
  
  FIELD_ORDER.forEach(key => {
    const value = state.responses[key];
    if (value) {
      const chip = document.createElement('div');
      chip.className = 'history-chip';
      chip.innerHTML = `
        <div class="history-chip-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <span class="history-chip-label">${FIELD_LABELS[key]}:</span>
        <span class="history-chip-value">${escapeHtml(value)}</span>
      `;
      chipsContainer.appendChild(chip);
    }
  });
}

function setOrbState(state) {
  const orb = document.getElementById('orb-outer');
  orb.className = 'orb-layer orb-outer ' + state;
}

function setStatus(text, className) {
  const el = document.getElementById('orb-status');
  el.textContent = text;
  el.className = 'orb-status' + (className ? ' ' + className : '');
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function showToast(msg, duration = 3000) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('visible');
  setTimeout(() => toast.classList.remove('visible'), duration);
}

// ══════════════════════════════════════════════════════════
// INITIALIZATION
// ══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Check for OAuth redirect
  const handled = handleOAuthRedirect();
  
  if (!handled) {
    // Check for saved session
    const saved = loadUserSession();
    if (saved) {
      state.user = saved;
      goToChat();
    }
  }
});

// Register Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
</body>
